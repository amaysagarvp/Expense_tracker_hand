<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            justify-content: center;

        }

        .input {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-top: 20px;
        }
        .input input{
            border-radius: 20px;
            border: solid black;
            text-align: center;
            height: 50px;
            width: 200px;

        }
        .input button{
            height: 70;
            width: 200px;
            border-radius: 30px;
            border: solid navy;
            
        }
        .list{
           font-size: 30px;
           font-weight: 400; 
           font-family: Georgia, 'Times New Roman', Times, serif;
           padding-left: 50px;
        
        }
         .list delete{
            border-radius: 5px;
            border: solid red;
        } 
    </style>
</head>

<body>
    <div class="container">
        <h1>Expense Tracker</h1>
    </div>

    <div class="input">
        <input type="text" id="inputText" placeholder="Expense">
        <input type="text" id="inputAmount" placeholder="amout">
        <button class="inputBtn" id="inputBtn">Add</button>
    </div>

    <div class="list" id="list">

    </div>

    <script>
        const descriptionInput = document.getElementById("inputText");
        const AmountInput = document.getElementById("inputAmount");
        const btn = document.getElementById("inputBtn");
        const list = document.getElementById("list");

        let editId = null;

       let expenses  = JSON.parse(localStorage.getItem("expenses")) || [];
       renderExpenses();

        btn.addEventListener("click",()=> {
           const description = descriptionInput.value.trim();
           const amount = parseFloat(AmountInput.value);

           if(description ===""||isNaN(amount) || amount <= 0){
            alert("Please provide the valide description and amount");
            return;
           }

           if(editId !== null){
            expenses = expenses.map(expense =>{
                if(expense.id === editId){
                    return{
                        ...expense,description,amount
                    };
                }
                return expense;
            });
             editId=null;

           }else{
            const currentExpneses = {
            id:Date.now(),
            description:description,
            amount:amount
            
           };
           expenses.push(currentExpneses); 
           }

           
           
           renderExpenses();
           saveExpenses();

           descriptionInput.value = "";
           AmountInput.value = "";     
        })

        function renderExpenses(){
            list.innerHTML="";
            expenses.forEach(expense=>{
                list.innerHTML += `<li>${expense.description} -
                     ₹${expense.amount}
                     <button onclick="deleteExpense(${expense.id})">Delete</button>
                     <button onclick="editExpense(${expense.id})">Edit</button></li>`
            });
          }
          function deleteExpense(id){
            expenses = expenses.filter(expense => expense.id !==id)
            renderExpenses();
            saveExpenses();
          }

          function saveExpenses(){
            localStorage.setItem("expenses",JSON.stringify(expenses));
          }

          function editExpense(id){
           const selectExpense = expenses.find(expense =>expense.id === id);
            descriptionInput.value = selectExpense.description;
            AmountInput.value = selectExpense.amount;
            editId=id;
           }
          
    </script>

</body>

</html>
